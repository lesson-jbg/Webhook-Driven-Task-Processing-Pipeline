version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: webhook_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_pipeline
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d webhook_pipeline']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: webhook_api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/webhook_pipeline
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: arcee-ai/trinity-large-preview:free
      PORT: 3000
    command: sh -c "npm run migrate && npm run start"

volumes:
  postgres_data:
